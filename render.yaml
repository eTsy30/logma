services:
  - type: web
    name: back
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-db
          property: connectionString

databases:
  - name: prisma-db
    databaseName: back
    user: back
